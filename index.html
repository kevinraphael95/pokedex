<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7f0000">
  <title>Pokédex Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Global overlays -->
  <div class="scanline" aria-hidden="true"></div>

  <!-- ── Pokédex Shell ──────────────────────────────────── -->
  <div class="pokedex" role="main" aria-label="Pokédex">
    <div class="dex-inner">

      <!-- ══ LEFT COLUMN ══════════════════════════════════ -->
      <div class="dex-left">

        <!-- Lens + indicator dots -->
        <div class="lens-group" aria-hidden="true">
          <div class="lens">
            <div class="lens__inner"></div>
            <div class="lens__glare"></div>
          </div>
          <div class="dots">
            <div class="dot dot--r" title="Power"></div>
            <div class="dot dot--y" title="Alert"></div>
            <div class="dot dot--g" title="Ready"></div>
          </div>
        </div>

        <!-- Main screen -->
        <div class="screen-wrap" id="screen-wrap">
          <div class="screen__scanlines" aria-hidden="true"></div>
          <div class="screen__grid"      aria-hidden="true"></div>
          <div class="screen__corner tl" aria-hidden="true"></div>
          <div class="screen__corner tr" aria-hidden="true"></div>
          <div class="screen__corner bl" aria-hidden="true"></div>
          <div class="screen__corner br" aria-hidden="true"></div>
          <span class="screen__label"   aria-hidden="true">GAME FREAK</span>
          <img id="sprite" src="" alt="Sprite du Pokémon" style="opacity:0">
        </div>

        <!-- #ID line -->
        <p id="poke-id" class="poke-id" aria-live="polite"></p>

        <!-- Type badges -->
        <div id="type-row" class="type-row" role="list" aria-label="Types"></div>

        <!-- Stat bars -->
        <div id="stats-section" class="stats-section" aria-label="Statistiques de base"></div>

        <!-- Decorative speaker -->
        <div class="speaker" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>

      </div><!-- /dex-left -->


      <!-- ══ RIGHT COLUMN ═════════════════════════════════ -->
      <div class="dex-right">

        <!-- Mini readout screen -->
        <div class="mini-screen" role="status" aria-live="polite">
          <div class="ms-status" id="ms-status">POKÉDEX</div>
          <div class="ms-name"   id="ms-name">— — —</div>
          <div class="ms-cat"    id="ms-cat"></div>
          <div class="xp-bar" aria-hidden="true">
            <div class="xp-fill" id="xp-fill"></div>
          </div>
        </div>

        <!-- Search row -->
        <div class="search-row" role="search">
          <label for="q" class="visually-hidden">Rechercher un Pokémon</label>
          <input
            id="q"
            type="search"
            placeholder="Nom (fr/en) ou #ID…"
            value="garchomp"
            autocomplete="off"
            spellcheck="false"
            aria-label="Nom ou numéro du Pokémon"
          >
          <button
            class="btn btn--go"
            onclick="window.__dex.go()"
            aria-label="Rechercher"
          >
            <span class="btn__face">OK</span>
          </button>
          <button
            class="btn btn--rand"
            onclick="window.__dex.rand()"
            aria-label="Pokémon aléatoire"
            title="Aléatoire"
          >
            <span class="btn__face">?</span>
          </button>
        </div>

        <!-- Tab bar -->
        <div class="tabs" role="tablist" aria-label="Sections">
          <button class="tab active" role="tab" aria-selected="true"  data-tab="info"   onclick="window.__dex.setTab('info')">INFOS</button>
          <button class="tab"        role="tab" aria-selected="false" data-tab="combat" onclick="window.__dex.setTab('combat')">COMBAT</button>
          <button class="tab"        role="tab" aria-selected="false" data-tab="strat"  onclick="window.__dex.setTab('strat')">STRAT</button>
          <button class="tab"        role="tab" aria-selected="false" data-tab="evo"    onclick="window.__dex.setTab('evo')">ÉVO</button>
        </div>

        <!-- Panes -->
        <div id="pane-info"   class="pane active" role="tabpanel" aria-label="Informations">
          <div class="state-msg state-msg--loading">CHARGEMENT…</div>
        </div>
        <div id="pane-combat" class="pane" role="tabpanel" aria-label="Combat"></div>
        <div id="pane-strat"  class="pane" role="tabpanel" aria-label="Stratégie"></div>
        <div id="pane-evo"    class="pane" role="tabpanel" aria-label="Évolutions"></div>

        <!-- D-pad + circle buttons (decorative) -->
        <div class="dpad-area" aria-hidden="true">
          <div class="dpad">
            <div class="dpad__h"></div>
            <div class="dpad__v"></div>
            <div class="dpad__c"></div>
          </div>
          <div class="circle-btns">
            <button class="circle-btn circle-btn--a" tabindex="-1">A</button>
            <button class="circle-btn circle-btn--b" tabindex="-1">B</button>
          </div>
        </div>

      </div><!-- /dex-right -->

    </div><!-- /dex-inner -->
  </div><!-- /pokedex -->

  <!-- Accessibility helper -->
  <style>.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}</style>

  <script src="pokédex.js"></script>
</body>
</html>
